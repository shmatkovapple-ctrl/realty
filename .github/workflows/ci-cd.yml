name: CI/CD — realty

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: localhost:5000

jobs:

  build:
    name: Build & Push images
    runs-on: self-hosted
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build user-service
        run: |
          docker build \
            -t $REGISTRY/realty/user-service:${{ github.sha }} \
            -t $REGISTRY/realty/user-service:latest \
            -f services/user-service/Dockerfile .
          docker push $REGISTRY/realty/user-service:latest

      - name: Build listing-service
        run: |
          docker build \
            -t $REGISTRY/realty/listing-service:latest \
            -f services/listing-service/Dockerfile .
          docker push $REGISTRY/realty/listing-service:latest

      - name: Build deal-service
        run: |
          docker build \
            -t $REGISTRY/realty/deal-service:latest \
            -f services/deal-service/Dockerfile .
          docker push $REGISTRY/realty/deal-service:latest

      - name: Build search-service
        run: |
          docker build \
            -t $REGISTRY/realty/search-service:latest \
            -f services/search-service/Dockerfile .
          docker push $REGISTRY/realty/search-service:latest

      - name: Build notification-service
        run: |
          docker build \
            -t $REGISTRY/realty/notification-service:latest \
            -f services/notification-service/Dockerfile .
          docker push $REGISTRY/realty/notification-service:latest

      - name: Build api-gateway
        run: |
          docker build \
            -t $REGISTRY/realty/api-gateway:latest \
            -f services/api-gateway/Dockerfile .
          docker push $REGISTRY/realty/api-gateway:latest

  deploy:
    name: Deploy to Minikube
    runs-on: self-hosted
    needs: build
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Apply namespace and config
        run: |
          kubectl apply -f k8s/namespace.yml
          kubectl apply -f k8s/secrets.yml
          kubectl apply -f k8s/configmap.yml

      - name: Deploy infrastructure
        run: |
          kubectl apply -f k8s/infra/
          echo "Waiting for postgres..."
          kubectl wait --for=condition=ready pod \
            -l app=postgres -n realty --timeout=180s
          echo "Waiting for redis..."
          kubectl wait --for=condition=ready pod \
            -l app=redis -n realty --timeout=60s

      - name: Deploy services
        run: |
          kubectl apply -f k8s/services/
          echo "Waiting for api-gateway..."
          kubectl rollout status deployment/api-gateway \
            -n realty --timeout=300s

      - name: Show result
        run: |
          echo "=== PODS ==="
          kubectl get pods -n realty
          echo "=== SERVICES ==="
          kubectl get services -n realty
          echo "=== URL ==="
          minikube service api-gateway -n realty --url

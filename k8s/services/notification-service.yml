apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service
  namespace: realty
spec:
  replicas: 1
  selector:
    matchLabels:
      app: notification-service
  template:
    metadata:
      labels:
        app: notification-service
    spec:
      containers:
      - name: notification-service
        image: 192.168.49.1:5000/realty/notification-service:latest
        envFrom:
        - configMapRef:
            name: realty-config
        - secretRef:
            name: realty-secrets
        ports:
        - containerPort: 50055
          name: grpc
        readinessProbe:
          tcpSocket:
            port: 50055
          initialDelaySeconds: 10
          periodSeconds: 5
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "256Mi"
            cpu: "300m"
---
apiVersion: v1
kind: Service
metadata:
  name: notification-service
  namespace: realty
spec:
  selector:
    app: notification-service
  ports:
  - name: grpc
    port: 50055
    targetPort: 50055

apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: realty
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
      - name: api-gateway
        image: localhost:5000/realty/api-gateway:latest
        envFrom:
        - configMapRef:
            name: realty-config
        - secretRef:
            name: realty-secrets
        ports:
        - containerPort: 8080
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 25
          periodSeconds: 10
          failureThreshold: 5
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "256Mi"
            cpu: "300m"
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: realty
spec:
  selector:
    app: api-gateway
  type: NodePort
  ports:
  - port: 8080
    targetPort: 8080
    nodePort: 30080

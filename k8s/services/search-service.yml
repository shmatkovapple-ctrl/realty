apiVersion: apps/v1
kind: Deployment
metadata:
  name: search-service
  namespace: realty
spec:
  replicas: 1
  selector:
    matchLabels:
      app: search-service
  template:
    metadata:
      labels:
        app: search-service
    spec:
      containers:
      - name: search-service
        image: 192.168.49.1:5000/realty/search-service:latest
        envFrom:
        - configMapRef:
            name: realty-config
        - secretRef:
            name: realty-secrets
        ports:
        - containerPort: 50054
          name: grpc
        readinessProbe:
          tcpSocket:
            port: 50054
          initialDelaySeconds: 10
          periodSeconds: 5
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "256Mi"
            cpu: "300m"
---
apiVersion: v1
kind: Service
metadata:
  name: search-service
  namespace: realty
spec:
  selector:
    app: search-service
  ports:
  - name: grpc
    port: 50054
    targetPort: 50054

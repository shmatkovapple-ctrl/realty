apiVersion: apps/v1
kind: Deployment
metadata:
  name: deal-service
  namespace: realty
spec:
  replicas: 1
  selector:
    matchLabels:
      app: deal-service
  template:
    metadata:
      labels:
        app: deal-service
    spec:
      containers:
      - name: deal-service
        image: localhost:5000/realty/deal-service:latest
        envFrom:
        - configMapRef:
            name: realty-config
        - secretRef:
            name: realty-secrets
        ports:
        - containerPort: 50053
          name: grpc
        - containerPort: 8083
          name: http
        readinessProbe:
          httpGet:
            path: /health
            port: 8083
          initialDelaySeconds: 20
          periodSeconds: 10
          failureThreshold: 5
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "256Mi"
            cpu: "300m"
        restartPolicy: Always
---
apiVersion: v1
kind: Service
metadata:
  name: deal-service
  namespace: realty
spec:
  selector:
    app: deal-service
  ports:
  - name: grpc
    port: 50053
    targetPort: 50053
  - name: http
    port: 8083
    targetPort: 8083

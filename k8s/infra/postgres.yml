apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: realty
spec:
  serviceName: postgres
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
      - name: postgres
        image: postgres:15
        env:
        - name: POSTGRES_USER
          value: "usr"
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: realty-secrets
              key: POSTGRES_PASSWORD
        - name: POSTGRES_DB
          value: "lets_goto_it"
        ports:
        - containerPort: 5432
        readinessProbe:
          exec:
            command: ["pg_isready", "-U", "usr"]
          initialDelaySeconds: 10
          periodSeconds: 5
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        volumeMounts:
        - name: pg-data
          mountPath: /var/lib/postgresql/data
  volumeClaimTemplates:
  - metadata:
      name: pg-data
    spec:
      accessModes: ["ReadWriteOnce"]
      resources:
        requests:
          storage: 5Gi
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: realty
spec:
  selector:
    app: postgres
  ports:
  - port: 5432
    targetPort: 5432

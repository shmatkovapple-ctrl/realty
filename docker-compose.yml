services:
  psql:
    image: postgres:15
    command: postgres -c config_file=/postgresql.conf
    environment:
      PGDATA: postgresql
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: tr134sdfWE
      POSTGRES_DB: postgres
    volumes:
      - ./docker-entrypoint-initdb.d:/docker-entrypoint-initdb.d
      - ./postgresql.conf:/postgresql.conf
      - pg_data:/var/lib/postgresql/data
    ports:
      - "6432:5432"
    networks:
      - realty-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    networks:
      - realty-net
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - realty-net
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,PLAINTEXT_INTERNAL://kafka:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT_INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    networks:
      - realty-net
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 5

  minio:
    image: minio/minio:latest
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    command: server /data --console-address ":9001"
    networks:
      - realty-net
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 15s
      timeout: 5s
      retries: 5

  elasticsearch:
    image: elasticsearch:8.11.0
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9200:9200"
    networks:
      - realty-net
    volumes:
      - elastic_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 5

  migrate:
    image: migrate/migrate
    depends_on:
      psql:
        condition: service_healthy
    volumes:
      - ./migrations:/migrations
    command: [
      "-path", "/migrations",
      "-database", "postgres://usr:pass@psql:5432/lets_goto_it?sslmode=disable",
      "up"
    ]
    networks:
      - realty-net

  user-service:
    build:
      context: .
      dockerfile: services/user-service/Dockerfile
    environment:
      GRPC_PORT: 50051
      HTTP_PORT: 8081
      DATABASE_URL: postgres://usr:pass@psql:5432/lets_goto_it?sslmode=disable
      REDIS_URL: redis://redis:6379
      JWT_SECRET: supersecretkey_change_in_prod
    ports:
      - "50051:50051"
    depends_on:
      psql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - realty-net
    restart: unless-stopped

  listing-service:
    build:
      context: .
      dockerfile: services/listing-service/Dockerfile
    environment:
      GRPC_PORT: 50052
      HTTP_PORT: 8082
      DATABASE_URL: postgres://usr:pass@psql:5432/lets_goto_it?sslmode=disable
      REDIS_URL: redis://redis:6379
      KAFKA_URL: kafka:29092
      MINIO_URL: minio:9000
      MINIO_USER: minioadmin
      MINIO_PASSWORD: minioadmin123
    ports:
      - "50052:50052"
    depends_on:
      psql:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - realty-net
    restart: unless-stopped

  deal-service:
    build:
      context: .
      dockerfile: services/deal-service/Dockerfile
    environment:
      GRPC_PORT: 50053
      HTTP_PORT: 8083
      DATABASE_URL: postgres://usr:pass@psql:5432/lets_goto_it?sslmode=disable
      KAFKA_URL: kafka:29092
    ports:
      - "50053:50053"
    depends_on:
      psql:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - realty-net
    restart: unless-stopped

  search-service:
    build:
      context: .
      dockerfile: services/search-service/Dockerfile
    environment:
      GRPC_PORT: 50054
      HTTP_PORT: 8084
      ELASTIC_URL: http://elasticsearch:9200
      REDIS_URL: redis://redis:6379
      KAFKA_URL: kafka:29092
    ports:
      - "50054:50054"
    depends_on:
      elasticsearch:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - realty-net
    restart: unless-stopped

  notification-service:
    build:
      context: .
      dockerfile: services/notification-service/Dockerfile
    environment:
      GRPC_PORT: 50055
      HTTP_PORT: 8085
      DATABASE_URL: postgres://usr:pass@psql:5432/lets_goto_it?sslmode=disable
      KAFKA_URL: kafka:29092
    ports:
      - "50055:50055"
    depends_on:
      psql:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - realty-net
    restart: unless-stopped

  api-gateway:
    build:
      context: .
      dockerfile: services/api-gateway/Dockerfile
    environment:
      HTTP_PORT: 8080
      REDIS_URL: redis://redis:6379
      USER_SERVICE_ADDR: user-service:50051
      LISTING_SERVICE_ADDR: listing-service:50052
      DEAL_SERVICE_ADDR: deal-service:50053
      SEARCH_SERVICE_ADDR: search-service:50054
      NOTIFICATION_SERVICE_ADDR: notification-service:50055
    ports:
      - "8080:8080"
    depends_on:
      - user-service
      - listing-service
      - deal-service
      - search-service
      - notification-service
    networks:
      - realty-net
    restart: unless-stopped

networks:
  realty-net:
    driver: bridge

volumes:
  pg_data:
  redis_data:
  zookeeper_data:
  kafka_data:
  minio_data:
  elastic_data: